zerops:
  - setup: api
    build:
      base: nodejs@20
      buildCommands:
        - npm install
      deployFiles:
        - src
        - public
        - package.json
        - package-lock.json
      cache: node_modules
    run:
      base: nodejs@20
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DB_HOST: db
        DB_PORT: "5432"
        DB_USER: ${db_user}
        DB_PASSWORD: ${db_password}
        DB_NAME: ${db_hostname}
        CACHE_HOST: cache
        CACHE_PORT: "6379"
      start: node src/index.js