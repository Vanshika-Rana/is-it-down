<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Is It Down?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafaf9;
        --surface: #ffffff;
        --surface-soft: #f5f5f4;
        --text: #111827;
        --muted: #6b7280;
        --border: #e7e5e4;
        --border-strong: #d6d3d1;
        --green: #16a34a;
        --green-soft: #ecfdf3;
        --red: #dc2626;
        --red-soft: #fef2f2;
        --blue: #2563eb;
        --shadow-soft: 0 4px 10px rgba(17, 24, 39, 0.04);
        --shadow-card: 0 8px 24px rgba(17, 24, 39, 0.06);
        --radius-lg: 16px;
        --radius-md: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .container {
        max-width: 1040px;
        margin: 0 auto;
        padding: 48px 20px 24px;
      }

      .hero {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 42px);
        line-height: 1.05;
        letter-spacing: -0.03em;
        font-weight: 800;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .last-updated {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        padding: 8px 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
        box-shadow: var(--shadow-soft);
      }

      form {
        display: grid;
        grid-template-columns: minmax(140px, 1fr) minmax(260px, 2fr) auto;
        gap: 10px;
      }

      input,
      button {
        height: 44px;
        border-radius: 10px;
        font-size: 14px;
      }

      input {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 0 12px;
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus-visible {
        outline: 2px solid rgba(37, 99, 235, 0.25);
        outline-offset: 1px;
        border-color: #93c5fd;
      }

      .primary-btn {
        border: 0;
        background: #111827;
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.01em;
        padding: 0 16px;
        cursor: pointer;
        transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 3px 8px rgba(17, 24, 39, 0.18);
      }

      .primary-btn:hover {
        background: #0b1220;
      }

      .primary-btn:active {
        transform: translateY(1px);
      }

      .status {
        min-height: 22px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .stats {
        margin-top: 16px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
        padding: 16px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .stat-value {
        margin-top: 6px;
        font-size: clamp(24px, 4vw, 30px);
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .grid {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .card {
        border: 1px solid var(--border);
        border-left: 6px solid var(--border-strong);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow-card);
        padding: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: start;
      }

      .card.up {
        border-left-color: var(--green);
      }

      .card.down,
      .card.unknown {
        border-left-color: var(--red);
      }

      .name-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .name {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .url {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        word-break: break-all;
      }

      .metrics {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .metric-pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface-soft);
        font-size: 12px;
        color: #374151;
        padding: 5px 10px;
        font-weight: 600;
      }

      .right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 6px 11px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .badge.up {
        background: var(--green-soft);
        color: #166534;
      }

      .badge.up .badge-dot {
        background: var(--green);
        animation: pulse 1.7s infinite;
      }

      .badge.down,
      .badge.unknown {
        background: var(--red-soft);
        color: #991b1b;
      }

      .badge.down .badge-dot,
      .badge.unknown .badge-dot {
        background: var(--red);
      }

      .uptime-label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      .uptime-value {
        font-size: clamp(28px, 4vw, 34px);
        line-height: 1;
        letter-spacing: -0.02em;
        font-weight: 800;
      }

      .danger {
        margin-top: 2px;
        border: 1px solid #fecaca;
        border-radius: 9px;
        background: #fff;
        color: #b91c1c;
        font-size: 12px;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      .danger:hover {
        background: #fef2f2;
      }

      .empty {
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius-lg);
        background: var(--surface);
        text-align: center;
        color: var(--muted);
        padding: 38px 20px;
        font-size: 14px;
      }

      .empty strong {
        color: #1f2937;
      }

      .foot-wrap {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .zerops {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        background: #fff;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.35);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }

      @media (max-width: 860px) {
        .container {
          padding-top: 30px;
        }

        .hero {
          align-items: flex-start;
        }

        form {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .card {
          grid-template-columns: 1fr;
        }

        .right {
          align-items: flex-start;
        }

        .foot-wrap {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div>
          <h1>Is It Down?</h1>
          <p class="subtitle">Real-time uptime monitoring for production services</p>
        </div>
        <div class="last-updated" id="last-updated">Refreshing...</div>
      </header>

      <section class="panel">
        <form id="monitor-form">
          <input id="name" type="text" placeholder="Name (optional)" />
          <input id="url" type="url" placeholder="https://example.com" required />
          <button type="submit" class="primary-btn">Add Monitor</button>
        </form>
        <div class="status" id="status-message"></div>
      </section>

      <section class="stats" id="stats">
        <article class="stat">
          <div class="stat-label">Total Monitors</div>
          <div class="stat-value" id="stat-total">0</div>
        </article>
        <article class="stat">
          <div class="stat-label">Currently Up</div>
          <div class="stat-value" id="stat-up">0</div>
        </article>
        <article class="stat">
          <div class="stat-label">Avg Uptime (24h)</div>
          <div class="stat-value" id="stat-uptime">N/A</div>
        </article>
      </section>

      <section class="grid" id="monitor-list"></section>

      <footer class="foot-wrap">
        <span>Auto-refresh every 10 seconds</span>
        <span class="zerops">Powered by Zerops</span>
      </footer>
    </main>

    <script>
      const monitorList = document.getElementById("monitor-list");
      const statusMessage = document.getElementById("status-message");
      const lastUpdatedEl = document.getElementById("last-updated");
      const statTotal = document.getElementById("stat-total");
      const statUp = document.getElementById("stat-up");
      const statUptime = document.getElementById("stat-uptime");
      const form = document.getElementById("monitor-form");
      const nameInput = document.getElementById("name");
      const urlInput = document.getElementById("url");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setStatus(message, isError = false) {
        statusMessage.textContent = message;
        statusMessage.style.color = isError ? "#b91c1c" : "var(--muted)";
      }

      function formatUptime(value) {
        if (value === null || value === undefined) {
          return "N/A";
        }
        return `${value.toFixed(2)}%`;
      }

      function formatCheckedAt(isoDate) {
        if (!isoDate) {
          return "No checks yet";
        }

        const now = Date.now();
        const checked = new Date(isoDate).getTime();
        if (Number.isNaN(checked)) {
          return "No checks yet";
        }

        const diffSeconds = Math.max(0, Math.floor((now - checked) / 1000));
        if (diffSeconds < 60) {
          return "just now";
        }
        if (diffSeconds < 3600) {
          const mins = Math.floor(diffSeconds / 60);
          return `${mins} min${mins === 1 ? "" : "s"} ago`;
        }
        if (diffSeconds < 86400) {
          const hours = Math.floor(diffSeconds / 3600);
          return `${hours} hour${hours === 1 ? "" : "s"} ago`;
        }
        const days = Math.floor(diffSeconds / 86400);
        return `${days} day${days === 1 ? "" : "s"} ago`;
      }

      function updateStats(monitors) {
        statTotal.textContent = String(monitors.length);
        const currentlyUp = monitors.filter((m) => m.latestStatus?.status === "up").length;
        statUp.textContent = String(currentlyUp);

        const withUptime = monitors
          .map((m) => m.uptime24hPct)
          .filter((v) => Number.isFinite(v));

        if (withUptime.length === 0) {
          statUptime.textContent = "N/A";
          return;
        }

        const avg = withUptime.reduce((sum, value) => sum + value, 0) / withUptime.length;
        statUptime.textContent = `${avg.toFixed(2)}%`;
      }

      function renderMonitors(monitors) {
        updateStats(monitors);

        if (!monitors.length) {
          monitorList.innerHTML =
            '<div class="empty"><strong>No monitors yet.</strong><br />Add your first service URL to start monitoring.</div>';
          return;
        }

        monitorList.innerHTML = monitors
          .map((monitor) => {
            const latest = monitor.latestStatus || {};
            const isUp = latest.status === "up";
            const hasStatus = Boolean(latest.status);
            const statusClass = hasStatus ? (isUp ? "up" : "down") : "unknown";
            const statusLabel = hasStatus ? (isUp ? "ONLINE" : "OFFLINE") : "OFFLINE";
            const response = latest.responseTimeMs ?? "N/A";
            const code = latest.statusCode ?? "-";

            return `
              <article class="card ${statusClass}">
                <div>
                  <div class="name-line">
                    <div class="badge ${statusClass}">
                      <span class="badge-dot"></span>
                      ${statusLabel}
                    </div>
                    <span class="name">${escapeHtml(monitor.name)}</span>
                  </div>
                  <div class="url">${escapeHtml(monitor.url)}</div>
                  <div class="metrics">
                    <span class="metric-pill">HTTP ${code}</span>
                    <span class="metric-pill">${response} ms</span>
                    <span class="metric-pill">Checked ${formatCheckedAt(latest.checkedAt)}</span>
                  </div>
                </div>
                <div class="right">
                  <div class="uptime-label">24h Uptime</div>
                  <div class="uptime-value">${formatUptime(monitor.uptime24hPct)}</div>
                  <button class="danger" onclick="removeMonitor(${monitor.id})">Delete</button>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function loadMonitors() {
        try {
          const response = await fetch("/api/monitors");
          if (!response.ok) {
            throw new Error("Failed to load monitors");
          }
          const monitors = await response.json();
          renderMonitors(monitors);
          lastUpdatedEl.textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function removeMonitor(id) {
        try {
          const response = await fetch(`/api/monitors/${id}`, { method: "DELETE" });
          if (!response.ok) {
            throw new Error("Delete failed");
          }
          setStatus("Monitor removed");
          loadMonitors();
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          name: nameInput.value.trim(),
          url: urlInput.value.trim(),
        };

        try {
          const response = await fetch("/api/monitors", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || "Failed to add monitor");
          }

          form.reset();
          setStatus("Monitor added");
          loadMonitors();
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      loadMonitors();
      setInterval(loadMonitors, 10000);
    </script>
  </body>
</html>
