<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Is It Down?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #f8f7ff;
        --bg-end: #fff8f0;
        --surface: #ffffff;
        --surface-soft: #fafafa;
        --text: #111111;
        --muted: #6b7280;
        --border: #e9e9ee;
        --green: #16a34a;
        --green-soft: #dcfce7;
        --red: #dc2626;
        --red-soft: #fee2e2;
        --blue-pill-bg: #eaf2ff;
        --blue-pill-text: #2563eb;
        --gray-pill-bg: #f1f5f9;
        --gray-pill-text: #475569;
        --shadow-soft: 0 1px 2px rgba(17, 24, 39, 0.03), 0 10px 20px rgba(17, 24, 39, 0.04);
        --radius-lg: 16px;
        --radius-md: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
        min-height: 100vh;
      }

      .container {
        max-width: 1060px;
        margin: 0 auto;
        padding: 52px 20px 26px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        margin-bottom: 24px;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .live-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
        animation: liveBlink 1.5s infinite;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 48px);
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #0b0b0f;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .last-updated {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.75);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        white-space: nowrap;
      }

      .panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
        box-shadow: var(--shadow-soft);
      }

      form {
        display: grid;
        grid-template-columns: minmax(140px, 1fr) minmax(260px, 2fr) auto;
        gap: 10px;
      }

      input,
      button {
        height: 44px;
        border-radius: 11px;
        font-size: 14px;
      }

      input {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 0 12px;
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus-visible {
        outline: none;
        border-color: #a5b4fc;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
      }

      .primary-btn {
        border: 0;
        background: #0f172a;
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.01em;
        padding: 0 17px;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.15s ease, background 0.15s ease;
        box-shadow: 0 8px 14px rgba(15, 23, 42, 0.2);
      }

      .primary-btn:hover {
        transform: scale(1.02);
        background: #020617;
      }

      .primary-btn:active {
        transform: scale(1);
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .stats {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-soft);
        padding: 16px;
      }

      .stat-label {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .stat-value {
        margin-top: 7px;
        font-size: clamp(28px, 4vw, 34px);
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .grid {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .card {
        opacity: 0;
        transform: translateY(10px);
        animation: cardIn 0.45s ease forwards;
        border: 1px solid var(--border);
        border-left: 4px solid #cbd5e1;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow-soft);
        padding: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: start;
      }

      .card.up {
        border-left-color: var(--green);
      }

      .card.down,
      .card.unknown {
        border-left-color: var(--red);
      }

      .name-line {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .name {
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .url {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        word-break: break-all;
      }

      .metrics {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .metric-pill {
        border-radius: 999px;
        font-size: 12px;
        padding: 5px 10px;
        font-weight: 600;
        border: 1px solid transparent;
      }

      .metric-pill.http {
        background: var(--gray-pill-bg);
        color: var(--gray-pill-text);
        border-color: #e2e8f0;
      }

      .metric-pill.response {
        background: var(--blue-pill-bg);
        color: var(--blue-pill-text);
        border-color: #dbeafe;
      }

      .checked {
        margin-top: 9px;
        color: #9ca3af;
        font-size: 12px;
        font-style: italic;
      }

      .right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 6px 11px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .badge.up {
        background: var(--green-soft);
        color: var(--green);
      }

      .badge.up .badge-dot {
        background: var(--green);
        animation: pulse 1.7s infinite;
      }

      .badge.down,
      .badge.unknown {
        background: var(--red-soft);
        color: var(--red);
      }

      .badge.down .badge-dot,
      .badge.unknown .badge-dot {
        background: var(--red);
      }

      .uptime-label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      .uptime-value {
        font-size: 2rem;
        line-height: 1;
        font-weight: 900;
        color: #111827;
        letter-spacing: -0.02em;
      }

      .danger {
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #9ca3af;
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.65;
        transition: opacity 0.15s ease, color 0.15s ease, background 0.15s ease;
      }

      .danger:hover {
        opacity: 1;
        color: #4b5563;
        background: #f3f4f6;
      }

      .empty {
        border: 1px dashed #d6d3d1;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.8);
        text-align: center;
        color: var(--muted);
        padding: 36px 20px;
        font-size: 14px;
      }

      .empty strong {
        color: #1f2937;
      }

      footer {
        margin-top: 24px;
        text-align: center;
        color: #9ca3af;
        font-size: 12px;
      }

      footer a {
        color: #6b7280;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.35);
        }
        70% {
          box-shadow: 0 0 0 7px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }

      @keyframes liveBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 860px) {
        .container {
          padding-top: 36px;
        }

        .hero {
          flex-direction: column;
          align-items: flex-start;
        }

        form {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .card {
          grid-template-columns: 1fr;
        }

        .right {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div>
          <div class="title-wrap">
            <span class="live-dot" aria-hidden="true"></span>
            <h1>Is It Down?</h1>
          </div>
          <p class="subtitle">Real-time uptime monitoring for production services</p>
        </div>
        <div class="last-updated" id="last-updated">Refreshing...</div>
      </header>

      <section class="panel">
        <form id="monitor-form">
          <input id="name" type="text" placeholder="Name (optional)" />
          <input id="url" type="url" placeholder="https://example.com" required />
          <button type="submit" class="primary-btn">Add Monitor</button>
        </form>
        <div class="status" id="status-message"></div>
      </section>

      <section class="stats" id="stats">
        <article class="stat">
          <div class="stat-label"><span aria-hidden="true">👁</span> Total Monitors</div>
          <div class="stat-value" id="stat-total">0</div>
        </article>
        <article class="stat">
          <div class="stat-label"><span aria-hidden="true">✅</span> Currently Up</div>
          <div class="stat-value" id="stat-up">0</div>
        </article>
        <article class="stat">
          <div class="stat-label"><span aria-hidden="true">📈</span> Avg Uptime</div>
          <div class="stat-value" id="stat-uptime">N/A</div>
        </article>
      </section>

      <section class="grid" id="monitor-list"></section>

      <footer>
        Powered by
        <a href="https://zerops.io" target="_blank" rel="noopener noreferrer">Zerops</a>
      </footer>
    </main>

    <script>
      const monitorList = document.getElementById("monitor-list");
      const statusMessage = document.getElementById("status-message");
      const lastUpdatedEl = document.getElementById("last-updated");
      const statTotal = document.getElementById("stat-total");
      const statUp = document.getElementById("stat-up");
      const statUptime = document.getElementById("stat-uptime");
      const form = document.getElementById("monitor-form");
      const nameInput = document.getElementById("name");
      const urlInput = document.getElementById("url");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setStatus(message, isError = false) {
        statusMessage.textContent = message;
        statusMessage.style.color = isError ? "#b91c1c" : "var(--muted)";
      }

      function formatUptime(value) {
        if (value === null || value === undefined) {
          return "N/A";
        }
        return `${value.toFixed(2)}%`;
      }

      function formatCheckedAt(isoDate) {
        if (!isoDate) {
          return "No checks yet";
        }

        const now = Date.now();
        const checked = new Date(isoDate).getTime();
        if (Number.isNaN(checked)) {
          return "No checks yet";
        }

        const diffSeconds = Math.max(0, Math.floor((now - checked) / 1000));
        if (diffSeconds < 60) {
          return "just now";
        }
        if (diffSeconds < 3600) {
          const mins = Math.floor(diffSeconds / 60);
          return `${mins} min${mins === 1 ? "" : "s"} ago`;
        }
        if (diffSeconds < 86400) {
          const hours = Math.floor(diffSeconds / 3600);
          return `${hours} hour${hours === 1 ? "" : "s"} ago`;
        }
        const days = Math.floor(diffSeconds / 86400);
        return `${days} day${days === 1 ? "" : "s"} ago`;
      }

      function animateValue(element, targetText) {
        const percentMatch = String(targetText).match(/^(\d+(?:\.\d+)?)%$/);
        const intMatch = String(targetText).match(/^(\d+)$/);

        if (!percentMatch && !intMatch) {
          element.textContent = targetText;
          return;
        }

        const isPercent = Boolean(percentMatch);
        const target = isPercent ? Number(percentMatch[1]) : Number(intMatch[1]);
        const duration = 550;
        const start = performance.now();

        function tick(now) {
          const progress = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = target * eased;

          if (isPercent) {
            element.textContent = `${current.toFixed(2)}%`;
          } else {
            element.textContent = `${Math.round(current)}`;
          }

          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            element.textContent = targetText;
          }
        }

        requestAnimationFrame(tick);
      }

      function updateStats(monitors) {
        const totalText = String(monitors.length);
        const currentlyUp = monitors.filter((m) => m.latestStatus?.status === "up").length;
        const upText = String(currentlyUp);

        const withUptime = monitors
          .map((m) => m.uptime24hPct)
          .filter((v) => Number.isFinite(v));

        let uptimeText = "N/A";
        if (withUptime.length > 0) {
          const avg = withUptime.reduce((sum, value) => sum + value, 0) / withUptime.length;
          uptimeText = `${avg.toFixed(2)}%`;
        }

        animateValue(statTotal, totalText);
        animateValue(statUp, upText);
        animateValue(statUptime, uptimeText);
      }

      function renderMonitors(monitors) {
        updateStats(monitors);

        if (!monitors.length) {
          monitorList.innerHTML =
            '<div class="empty"><strong>No monitors yet.</strong><br />Add your first service URL to start monitoring.</div>';
          return;
        }

        monitorList.innerHTML = monitors
          .map((monitor, index) => {
            const latest = monitor.latestStatus || {};
            const isUp = latest.status === "up";
            const hasStatus = Boolean(latest.status);
            const statusClass = hasStatus ? (isUp ? "up" : "down") : "unknown";
            const statusLabel = hasStatus ? (isUp ? "ONLINE" : "OFFLINE") : "OFFLINE";
            const response = latest.responseTimeMs ?? "N/A";
            const code = latest.statusCode ?? "-";

            return `
              <article class="card ${statusClass}" style="animation-delay: ${index * 100}ms;">
                <div>
                  <div class="name-line">
                    <div class="badge ${statusClass}">
                      <span class="badge-dot"></span>
                      ${statusLabel}
                    </div>
                    <span class="name">${escapeHtml(monitor.name)}</span>
                  </div>
                  <div class="url">${escapeHtml(monitor.url)}</div>
                  <div class="metrics">
                    <span class="metric-pill http">HTTP ${code}</span>
                    <span class="metric-pill response">${response} ms</span>
                  </div>
                  <div class="checked">Checked ${formatCheckedAt(latest.checkedAt)}</div>
                </div>
                <div class="right">
                  <div class="uptime-label">24h Uptime</div>
                  <div class="uptime-value">${formatUptime(monitor.uptime24hPct)}</div>
                  <button class="danger" aria-label="Delete monitor" onclick="removeMonitor(${monitor.id})">✕</button>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function loadMonitors() {
        try {
          const response = await fetch("/api/monitors");
          if (!response.ok) {
            throw new Error("Failed to load monitors");
          }
          const monitors = await response.json();
          renderMonitors(monitors);
          lastUpdatedEl.textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function removeMonitor(id) {
        try {
          const response = await fetch(`/api/monitors/${id}`, { method: "DELETE" });
          if (!response.ok) {
            throw new Error("Delete failed");
          }
          setStatus("Monitor removed");
          loadMonitors();
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          name: nameInput.value.trim(),
          url: urlInput.value.trim(),
        };

        try {
          const response = await fetch("/api/monitors", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || "Failed to add monitor");
          }

          form.reset();
          setStatus("Monitor added");
          loadMonitors();
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      loadMonitors();
      setInterval(loadMonitors, 10000);
    </script>
  </body>
</html>
